# =============================================================================
#  dbt_project.yml  —  the dbt project's main config file.
#  dbt reads this to know the project name, which connection profile to use,
#  where the models/snapshots/tests live, and the default materializations.
# =============================================================================

# The project name. Must be lowercase + underscores. Code refers to it (e.g. the
# models: block below and the profile name).
name: 'banking_dbt'
version: '1.0.0'

# WHICH connection profile to use (from ~/.dbt/profiles.yml). It must contain a
# profile literally named 'banking_dbt' with the Snowflake account/user/key/etc.
profile: 'banking_dbt'

# Where dbt looks for each kind of file. Defaults — you rarely change these.
model-paths: ["models"]        # your SELECT models (staging + marts) live here
analysis-paths: ["analyses"]
test-paths: ["tests"]          # custom (singular) tests
seed-paths: ["seeds"]          # CSV seed files
snapshot-paths: ["snapshots"]  # the SCD2 snapshot files live here

# Folders `dbt clean` deletes (build artifacts + downloaded packages).
clean-targets:
  - "target"
  - "dbt_packages"

# -----------------------------------------------------------------------------
# Default materializations per folder. Individual models override these with
# their own {{ config(...) }}. We set sensible defaults:
#   staging -> view  (light, always fresh)
#   marts   -> table (queried often by BI, so store them for speed)
# (This replaces the boilerplate "example:" block, which removed the
#  "unused configuration paths" warning.)
# -----------------------------------------------------------------------------
models:
  banking_dbt:
    staging:
      +materialized: view
    marts:
      +materialized: table
