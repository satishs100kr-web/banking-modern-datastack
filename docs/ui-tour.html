<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖥️ Interactive UI Tour — Banking Data Stack</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2230;--border:#2d333b;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;--teal:#39c5cf;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;font-size:14px}
  a{color:var(--accent);text-decoration:none}
  code{font-family:"SF Mono",Menlo,Consolas,monospace;background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12px}
  header{padding:24px 30px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#161b22,#1c2c4a)}
  header h1{font-size:22px}header p{color:var(--muted);font-size:13px;margin-top:4px}header a.back{font-size:12.5px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;padding:14px 30px;background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
  .tab{padding:8px 15px;border-radius:9px;border:1px solid var(--border);background:var(--panel2);color:var(--text);cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap}
  .tab:hover{border-color:var(--accent)}.tab.active{background:var(--accent);color:#04132b;border-color:var(--accent)}
  .tab .cnt{opacity:.7;font-weight:400;font-size:11px}
  main{max-width:1150px;margin:0 auto;padding:26px 30px 60px}
  .tool{display:none}.tool.active{display:block}
  .tool h2{font-size:21px;margin-bottom:4px}.tool .sub{color:var(--muted);font-size:13px;margin-bottom:16px}.tool .sub b{color:var(--teal)}
  .screen{background:var(--panel);border:1px solid var(--border);border-radius:14px;margin-bottom:24px;overflow:hidden}
  .screen-title{padding:12px 18px;border-bottom:1px solid var(--border);font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
  .screen-title .step{background:var(--accent);color:#04132b;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;flex:0 0 22px}
  .screen-body{padding:18px}
  .win{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#0b0f14}
  .win-bar{display:flex;align-items:center;gap:7px;padding:9px 12px;background:#1a1f29;border-bottom:1px solid var(--border)}
  .dot{width:11px;height:11px;border-radius:50%}.dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .url{flex:1;text-align:center;color:var(--muted);font-size:11.5px;font-family:monospace}
  .win-inner{padding:14px 16px}
  .pin{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 5px;border-radius:11px;background:var(--purple);color:#1a1030;font-size:11px;font-weight:800;cursor:pointer;vertical-align:middle;margin:0 4px;border:2px solid transparent;transition:.15s}
  .pin:hover,.pin.hl{background:#fff;border-color:var(--purple);box-shadow:0 0 0 3px rgba(188,140,255,.35)}
  .legend{margin-top:14px;display:grid;gap:6px}
  .leg{display:flex;gap:10px;padding:8px 11px;border-radius:9px;background:var(--panel2);border:1px solid transparent;cursor:pointer;font-size:13px;transition:.15s}
  .leg:hover{border-color:var(--border)}.leg.hl{border-color:var(--purple);background:rgba(188,140,255,.12)}
  .leg .n{flex:0 0 22px;height:22px;border-radius:50%;background:var(--purple);color:#1a1030;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
  .leg .child{color:var(--yellow);font-size:12px;display:block;margin-top:3px}
  table.m{width:100%;border-collapse:collapse;font-size:12.5px}
  table.m th{background:#1a1f29;text-align:left;padding:7px 10px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border)}
  table.m td{padding:8px 10px;border-bottom:1px solid #1a1f29}
  .sw{width:34px;height:18px;border-radius:10px;background:var(--green);position:relative;display:inline-block}
  .sw::after{content:"";position:absolute;right:2px;top:2px;width:14px;height:14px;border-radius:50%;background:#fff}
  .sw.off{background:#3a4250}.sw.off::after{left:2px;right:auto}
  .sq{display:inline-block;width:20px;height:20px;border-radius:4px;margin:2px}
  .sq.g{background:var(--green)}.sq.r{background:var(--red)}.sq.y{background:var(--yellow)}.sq.s{background:#30363d}
  .runsdot{display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 1px}
  .tree{font-family:monospace;font-size:12.5px;line-height:1.9}.tree .ind{color:var(--muted)}
  .jsonbox{background:#06090d;border-radius:8px;padding:12px;font-family:monospace;font-size:12px;color:#a5d6ff;white-space:pre;overflow-x:auto}
  .runbtn{background:var(--accent);color:#04132b;border:none;border-radius:6px;padding:5px 12px;font-weight:700;font-size:12px}
  .file{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px}.file:hover{background:#1a1f29}
  .bar{height:10px;border-radius:5px;background:var(--accent)}
  .tag2{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
  .tag2.ok{background:rgba(63,185,80,.2);color:var(--green)}.tag2.run{background:rgba(57,197,207,.2);color:var(--teal)}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px 0 10px;border-top:1px solid var(--border);margin-top:24px}
  .hint{font-size:12.5px;color:var(--muted);margin-bottom:14px;padding:9px 13px;background:rgba(88,166,255,.08);border-left:3px solid var(--accent);border-radius:8px}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">← Back to the full guide</a>
  <h1>🖥️ Interactive UI Tour</h1>
  <p>Every screen of every tool. Click the purple ① ② ③ pins (or the legend rows) to learn what each part means.</p>
</header>
<div class="tabs" id="tabs"></div>
<main id="main"></main>

<script>
const wb='<div class="win-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="url">';
function P(n){return '<span class="pin" data-n="'+n+'">'+n+'</span>';}

const TOOLS = [
/* ============================== AIRFLOW ============================== */
{ id:"airflow", icon:"🌬️", name:"Airflow", url:"http://localhost:8080", login:"admin / admin", screens:[
  { title:"DAGs home — the list of pipelines",
    mock:`<div class="win">${wb}localhost:8080/home</div><div class="win-inner">
      <table class="m"><tr><th>On ${P(1)}</th><th>DAG ${P(2)}</th><th>Runs ${P(3)}</th><th>Schedule ${P(4)}</th><th>Recent ${P(5)}</th><th>Actions ${P(6)}</th></tr>
      <tr><td><span class="sw"></span></td><td><b>minio_to_snowflake_banking</b></td><td><span style="color:var(--green)">✅12</span> <span style="color:var(--red)">❌1</span></td><td><code>*/1 * * * *</code></td><td><span class="runsdot" style="background:var(--green)"></span><span class="runsdot" style="background:var(--green)"></span><span class="runsdot" style="background:var(--red)"></span><span class="runsdot" style="background:var(--green)"></span></td><td>▶ ⟳ 🗑</td></tr>
      <tr><td><span class="sw off"></span></td><td><b>SCD2_snapshots</b></td><td><span style="color:var(--green)">✅3</span></td><td><code>@daily</code></td><td><span class="runsdot" style="background:var(--green)"></span><span class="runsdot" style="background:var(--green)"></span><span class="runsdot" style="background:var(--green)"></span></td><td>▶ ⟳ 🗑</td></tr></table>
    </div></div>`,
    legend:[{n:1,text:"<b>On/Off toggle.</b> Green = unpaused (runs on schedule). Grey = paused. You must turn this ON.",child:"the chore's on/off switch"},
      {n:2,text:"<b>DAG name</b> — click to open the pipeline's detail.",child:"the chore's name"},
      {n:3,text:"<b>Run counts</b> — ✅ success / ❌ fail / 🟡 running.",child:"how the attempts went"},
      {n:4,text:"<b>Schedule</b> — cron/preset. <code>*/1 * * * *</code>=every minute, <code>@daily</code>=once a day.",child:"how often to do it"},
      {n:5,text:"<b>Recent tasks</b> — dots = latest run's task states.",child:"the last attempt at a glance"},
      {n:6,text:"<b>Actions</b> — ▶ trigger now · ⟳ refresh · 🗑 delete.",child:"do-it-now button"}]},
  { title:"Grid view — the main debug screen",
    mock:`<div class="win">${wb}…/grid</div><div class="win-inner">
      <div style="display:grid;grid-template-columns:150px 1fr;gap:6px;font-size:12px;align-items:center">
        <div style="color:var(--muted)">runs → ${P(1)}</div><div style="color:var(--muted)">10:39&nbsp;&nbsp;10:40&nbsp;&nbsp;10:41&nbsp;&nbsp;10:42</div>
        <div>■ DAG run ${P(2)}</div><div><span class="sq g"></span><span class="sq r"></span><span class="sq g"></span><span class="sq g"></span></div>
        <div>download_minio ${P(3)}</div><div><span class="sq g"></span><span class="sq r"></span><span class="sq g"></span><span class="sq g"></span></div>
        <div>load_snowflake</div><div><span class="sq g"></span><span class="sq s"></span><span class="sq g"></span><span class="sq g"></span> ${P(4)}</div>
      </div></div></div>`,
    legend:[{n:1,text:"<b>Columns = runs</b> over time (newest right). Each column = one execution.",child:"each column = one attempt of the whole chore"},
      {n:2,text:"<b>Top bar = the whole run</b> (rolls up all tasks).",child:"did the whole chore pass?"},
      {n:3,text:"<b>Rows = tasks.</b> 🟩 ok · 🟥 failed · 🟨 running · ⬜ skipped · 🟧 retry.",child:"each row = one step"},
      {n:4,text:"<b>⬜ skipped</b> — didn't run because the task before failed. Click a 🟥 → side panel → Logs.",child:"a step skipped because an earlier one broke"}]},
  { title:"Task panel + Logs — where the error lives",
    mock:`<div class="win">${wb}task: load_snowflake (failed)</div><div class="win-inner">
      <div style="margin-bottom:8px">Task <b>load_snowflake</b> · State <span style="color:var(--red)">failed</span></div>
      <div style="margin-bottom:10px"><span class="runbtn" style="background:#30363d;color:#fff">Logs ${P(1)}</span> <span class="runbtn" style="background:#30363d;color:#fff">Clear ${P(2)}</span> <span class="runbtn" style="background:#30363d;color:#fff">XCom ${P(3)}</span></div>
      <div class="jsonbox">[10:40] INFO - Loading customers…
[10:40] ERROR - Task failed with exception
snowflake.connector.errors.DatabaseError: 250001:
  Could not connect to Snowflake  ${P(4)}</div></div></div>`,
    legend:[{n:1,text:"<b>Logs</b> — the task's full output (the diary where errors live).",child:"the teacher's note"},
      {n:2,text:"<b>Clear</b> — re-run this task after a fix.",child:"the 'try again' button"},
      {n:3,text:"<b>XCom</b> — small data passed to the next task (e.g. the file list).",child:"the note one step hands the next"},
      {n:4,text:"<b>Read the BOTTOM</b> of the log — the real error is the last lines.",child:"the actual mistake is at the very bottom"}]},
  { title:"Graph view — the shape of the pipeline",
    mock:`<div class="win">${wb}…/graph</div><div class="win-inner" style="text-align:center;padding:30px">
      <span style="border:2px solid var(--green);border-radius:8px;padding:10px 18px">download_minio ${P(1)}</span>
      <span style="color:var(--accent);font-size:20px;margin:0 14px">──▶ ${P(2)}</span>
      <span style="border:2px solid var(--red);border-radius:8px;padding:10px 18px">load_snowflake ${P(3)}</span>
    </div></div>`,
    legend:[{n:1,text:"<b>Task box</b> — border colour = its state in the selected run (green=ok).",child:"a step shown as a box"},
      {n:2,text:"<b>Arrow = dependency</b> (<code>task1 >> task2</code>). The next task waits for the first to succeed.",child:"the order steps must happen"},
      {n:3,text:"<b>Red border = failed</b> task. Click it to jump to its logs.",child:"a broken step"}]},
  { title:"Gantt — how long each task took",
    mock:`<div class="win">${wb}…/gantt</div><div class="win-inner">
      <div style="font-size:12px;display:grid;grid-template-columns:130px 1fr;gap:8px;align-items:center">
        <div>download_minio ${P(1)}</div><div><span class="bar" style="width:30%"></span> <span style="color:var(--muted)">2.1s</span></div>
        <div>load_snowflake ${P(2)}</div><div><span class="bar" style="width:70%;background:var(--yellow)"></span> <span style="color:var(--muted)">5.4s</span></div>
      </div></div></div>`,
    legend:[{n:1,text:"<b>Each bar = a task's duration</b> in a run. Length = time taken.",child:"how long each step took"},
      {n:2,text:"<b>The longest bar = your bottleneck</b> — where to optimize first.",child:"the slowest step to speed up"}]},
  { title:"Code & Admin tabs",
    mock:`<div class="win">${wb}…/code  ·  Admin ▾</div><div class="win-inner">
      <div class="jsonbox" style="color:#e6edf3">with DAG(dag_id="minio_to_snowflake_banking",
     schedule_interval="*/1 * * * *",
     catchup=False) as dag:        ${P(1)}</div>
      <div style="margin-top:10px;font-size:12.5px">Admin ▾ &nbsp; Connections ${P(2)} &nbsp; Variables ${P(3)} &nbsp; XComs ${P(4)}</div>
    </div></div>`,
    legend:[{n:1,text:"<b>Code tab</b> = the exact Python of the DAG (read-only) — confirm what's deployed.",child:"the recipe, exactly as written"},
      {n:2,text:"<b>Admin → Connections</b> = saved credentials to external systems (prod alternative to .env).",child:"a safe address book of passwords"},
      {n:3,text:"<b>Variables</b> = key/value settings you can read in DAGs.",child:"sticky-note settings"},
      {n:4,text:"<b>XComs</b> = the messages tasks pass to each other.",child:"notes passed between steps"}]},
]},
/* ============================== MINIO ============================== */
{ id:"minio", icon:"🪣", name:"MinIO", url:"http://localhost:9001", login:"minioadmin / minioadmin", screens:[
  { title:"Object Browser — buckets",
    mock:`<div class="win">${wb}localhost:9001 · Object Browser</div><div class="win-inner">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Left menu: Object Browser ${P(1)} · Buckets · Access Keys ${P(5)} · Monitoring ${P(6)}</div>
      <div class="file">📦 <b>raw</b> <span style="color:var(--muted)">— bucket, 3 objects</span> ${P(2)}</div>
      <div style="margin-left:18px"><div class="file">📁 customers/ ${P(3)}</div><div class="file">📁 accounts/</div><div class="file">📁 transactions/ ${P(4)}</div></div>
    </div></div>`,
    legend:[{n:1,text:"<b>Object Browser</b> = the main file view of your data lake.",child:"the file explorer"},
      {n:2,text:"<b>Bucket</b> = a top-level container (like AWS S3). Named <code>raw</code>.",child:"a big labeled box"},
      {n:3,text:"<b>Folder per table</b> — customers / accounts / transactions.",child:"a shelf per receipt type"},
      {n:4,text:"<b>Click a folder</b> to drill into its date partitions.",child:"open a shelf"},
      {n:5,text:"<b>Access Keys</b> — create S3 keys for code to connect (what boto3 uses).",child:"make a key for robots to use"},
      {n:6,text:"<b>Monitoring</b> — storage used, request counts, health.",child:"the storage-room gauges"}]},
  { title:"Inside a folder — Parquet files",
    mock:`<div class="win">${wb}raw/customers/date=2026-06-18/</div><div class="win-inner">
      <div class="file">📄 customers_153012.parquet <span style="color:var(--muted)">12.4 KB</span> &nbsp; ⬇ ${P(2)} 👁 ${P(3)} 🗑 ${P(4)} <span class="pin" data-n="1">1</span></div>
      <div class="file">📄 customers_153114.parquet <span style="color:var(--muted)">12.1 KB</span></div>
    </div></div>`,
    legend:[{n:1,text:"<b>Parquet file</b> = one batch of 50 rows (the consumer's <code>batch_size</code>).",child:"an envelope of 50 receipts"},
      {n:2,text:"<b>⬇ Download</b> the file to your Mac.",child:"take the envelope home"},
      {n:3,text:"<b>👁 Preview</b> — see the actual rows in the browser.",child:"read the receipts inside"},
      {n:4,text:"<b>🗑 Delete</b> the object.",child:"throw the envelope away"}]},
  { title:"Create bucket / settings",
    mock:`<div class="win">${wb}Buckets → Create Bucket</div><div class="win-inner">
      <div style="font-size:13px">Bucket Name [ <code>raw</code> ] ${P(1)}<br><br>
        ☐ Versioning ${P(2)} &nbsp; ☐ Object Locking &nbsp; ☐ Quota ${P(3)}<br><br>
        <span class="runbtn">Create Bucket ${P(4)}</span></div>
    </div></div>`,
    legend:[{n:1,text:"<b>Bucket name</b> — must be unique; lowercase. Your consumer auto-creates <code>raw</code> if missing.",child:"name your storage box"},
      {n:2,text:"<b>Versioning</b> — keep old versions of overwritten files (like SCD2 for files).",child:"keep old copies too"},
      {n:3,text:"<b>Quota</b> — cap how much the bucket can hold.",child:"a size limit"},
      {n:4,text:"<b>Create</b> — makes the bucket. (In this project the code does it for you.)",child:"build the box"}]},
]},
/* ============================== KAFKA UI ============================== */
{ id:"kafka", icon:"📨", name:"Kafka UI", url:"http://localhost:8085", login:"(no login)", screens:[
  { title:"Dashboard / Brokers",
    mock:`<div class="win">${wb}localhost:8085 · banking cluster</div><div class="win-inner">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Menu: Dashboard ${P(1)} · Brokers ${P(2)} · Topics · Consumers · Kafka Connect</div>
      <table class="m"><tr><th>Broker ${P(3)}</th><th>Status</th><th>Partitions</th></tr>
      <tr><td>kafka (id 1)</td><td><span class="tag2 ok">online</span></td><td>3 ${P(4)}</td></tr></table>
    </div></div>`,
    legend:[{n:1,text:"<b>Dashboard</b> — cluster health at a glance.",child:"the overview screen"},
      {n:2,text:"<b>Brokers</b> — the Kafka servers. You have 1 (prod uses 3+).",child:"the post offices"},
      {n:3,text:"<b>Broker id</b> — each server's number.",child:"each post office's name"},
      {n:4,text:"<b>Partitions</b> — total ordered logs the broker holds.",child:"how many mail lanes"}]},
  { title:"Topics — one stream per table",
    mock:`<div class="win">${wb}Topics</div><div class="win-inner">
      <table class="m"><tr><th>Topic ${P(1)}</th><th>Partitions ${P(2)}</th><th>Messages ${P(3)}</th></tr>
      <tr><td>banking_server.public.customers</td><td>1</td><td>910</td></tr>
      <tr><td>banking_server.public.accounts</td><td>1</td><td>1820</td></tr>
      <tr><td>banking_server.public.transactions</td><td>1</td><td>4550</td></tr></table>

    legend:[{n:1,text:"<b>Topic</b> — a named stream, one per source table.",child:"a mailbox per table"},
      {n:2,text:"<b>Partitions</b> — parallel lanes (1 here).",child:"mail lanes"},
      {n:3,text:"<b>Messages</b> — total change events captured.",child:"letters received"}]},
  { title:"Topic → Messages (read events)",

      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">Offset ${P(1)} · Key ${P(2)} · Value ↓</div>

    "before": null,
    "after": { "id": 3, "email": "alice@x.com" }, ${P(3)}

    "ts_ms": 1718…
} }</div></div></div>`,
    legend:[{n:1,text:"<b>Offset</b> — this message's position number in the partition.",child:"the letter's number in the pile"},
      {n:2,text:"<b>Key</b> — the row's primary key (used for partitioning).",child:"who the letter is about"},

    legend:[{n:1,text:"<b>Consumer group</b> — your <code>minio-landing-group</code>; its offsets are saved so it resumes after restart.",child:"the postman's team"},
      {n:2,text:"<b>Offset</b> — how far the consumer has read.",child:"last letter read"},

  { title:"Kafka Connect — Debezium status",
    mock:`<div class="win">${wb}Kafka Connect</div><div class="win-inner">
      <table class="m"><tr><th>Connector ${P(1)}</th><th>Type</th><th>Status ${P(2)}</th><th>Tasks ${P(3)}</th></tr>
      <tr><td>postgres-connector</td><td>source</td><td><span class="tag2 ok">RUNNING</span></td><td>1/1 running</td></tr></table>
    </div></div>`,
    legend:[{n:1,text:"<b>Connector</b> — the Debezium job capturing Postgres changes.",child:"the camera watching the DB"},
      {n:2,text:"<b>Status RUNNING</b> = healthy and streaming.",child:"the REC ● light is on"},
      {n:3,text:"<b>Tasks 1/1</b> — the worker doing the actual capture.",child:"the worker is on duty"}]},
]},
/* ============================== SNOWFLAKE ============================== */
{ id:"snowflake", icon:"❄️", name:"Snowflake", url:"app.snowflake.com", login:"your account", screens:[

/* ---------- render ---------- */
const tabsEl=document.getElementById('tabs'), mainEl=document.getElementById('main');
TOOLS.forEach((t,i)=>{
  const tab=document.createElement('div'); tab.className='tab'+(i===0?' active':''); tab.innerHTML=t.icon+' '+t.name+' <span class="cnt">'+t.screens.length+'</span>'; tab.dataset.id=t.id;
  tab.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));tab.classList.add('active');
    document.querySelectorAll('.tool').forEach(x=>x.classList.remove('active'));document.getElementById('tool-'+t.id).classList.add('active');window.scrollTo(0,0);};
  tabsEl.appendChild(tab);
  const tool=document.createElement('div'); tool.className='tool'+(i===0?' active':''); tool.id='tool-'+t.id;
  let h='<h2>'+t.icon+' '+t.name+'</h2><div class="sub">Open: <b>'+t.url+'</b>'+(t.login!=='—'?' · login: <b>'+t.login+'</b>':'')+' · '+t.screens.length+' screens</div>'+
    '<div class="hint">👆 Click the purple pins on each mockup — or the legend rows — to highlight & explain. The yellow 🧒 line is the explain-like-I am five version.</div>';
  t.screens.forEach((s,si)=>{
    const legH=s.legend.map(l=>'<div class="leg" data-n="'+l.n+'"><span class="n">'+l.n+'</span><span>'+l.text+'<span class="child">🧒 '+l.child+'</span></span></div>').join('');
    h+='<div class="screen"><div class="screen-title"><span class="step">'+(si+1)+'</span>'+s.title+'</div><div class="screen-body">'+s.mock+'<div class="legend">'+legH+'</div></div></div>';
  });
  tool.innerHTML=h+'<footer>Banking Modern Data Stack · interactive UI tour</footer>';
  mainEl.appendChild(tool);
});
document.querySelectorAll('.screen').forEach(screen=>{
  function set(n){screen.querySelectorAll('.pin,.leg').forEach(e=>e.classList.remove('hl'));
    screen.querySelectorAll('.pin[data-n="'+n+'"],.leg[data-n="'+n+'"]').forEach(e=>e.classList.add('hl'));}
  screen.querySelectorAll('.pin').forEach(p=>p.onclick=()=>{set(p.dataset.n);const l=screen.querySelector('.leg[data-n="'+p.dataset.n+'"]');if(l)l.scrollIntoView({behavior:'smooth',block:'nearest'});});
  screen.querySelectorAll('.leg').forEach(l=>l.onclick=()=>set(l.dataset.n));
});
