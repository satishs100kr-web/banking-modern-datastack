# =============================================================================
#  cd.yml  —  CONTINUOUS DEPLOYMENT
#  WHAT IT DOES: after code is merged to `main`, this "deploys" the dbt models —
#  it runs them against Snowflake so the warehouse reflects the new code.
#
#  REAL deploy needs Snowflake credentials, read from GitHub "Secrets"
#  (repo → Settings → Secrets and variables → Actions). The deploy step is
#  GUARDED so the workflow stays green even before you've added the secrets.
#
#  NOTE: GitHub does NOT allow the `secrets` context inside an `if:` condition,
#  so we copy the secret into a job-level env var (HAS_SNOWFLAKE) and check THAT.
#
#  To enable the real deploy, add these repo secrets:
#    SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_ROLE,
#    SNOWFLAKE_WAREHOUSE, SNOWFLAKE_DB, SNOWFLAKE_PRIVATE_KEY
# =============================================================================
name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Copy secrets to env at the JOB level. `env` IS allowed in `if:` (secrets are not).
    env:
      HAS_SNOWFLAKE: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_ACCOUNT:     ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:        ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE:        ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE:   ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DB:          ${{ secrets.SNOWFLAKE_DB }}
      SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install --no-cache-dir dbt-core dbt-snowflake

      # Build the models in Snowflake — ONLY if the secret is present.
      - name: dbt build (deploy to Snowflake)
        if: ${{ env.HAS_SNOWFLAKE != '' }}
        run: |
          mkdir -p ~/.dbt
          # profiles.yml that reads the creds from env vars (no hard-coding)
          cat > ~/.dbt/profiles.yml <<'EOF'
          banking_dbt:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
                user: "{{ env_var('SNOWFLAKE_USER') }}"
                role: "{{ env_var('SNOWFLAKE_ROLE') }}"
                authenticator: SNOWFLAKE_JWT
                private_key: "{{ env_var('SNOWFLAKE_PRIVATE_KEY') }}"
                database: "{{ env_var('SNOWFLAKE_DB') }}"
                warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
                schema: ANALYTICS
                threads: 4
          EOF
          cd banking_dbt && dbt build

      # If no secret yet, just say so (keeps the workflow green).
      - name: Skip notice
        if: ${{ env.HAS_SNOWFLAKE == '' }}
        run: echo "No Snowflake secrets set — skipping deploy. Add repo secrets to enable."
